
<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>प्रदेश कार्यालय व्यवस्थापन | Province Office Management</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --surface3:#30363d;
  --border:#30363d; --border2:#444c56;
  --primary:#2f81f7; --primary-d:#1f6feb; --primary-glow:rgba(47,129,247,0.15);
  --accent:#f78166; --accent2:#3fb950; --accent3:#d2a8ff; --accent4:#ffa657;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --purple:#8b5cf6;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --r:12px; --r-sm:8px; --r-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans','Noto Sans Devanagari',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ─── AUTH ─── */
#auth-screen{
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0d1117 0%,#161b22 50%,#0d1117 100%);
  padding:20px;overflow-y:auto;
}
.auth-glow{
  position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(47,129,247,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.auth-logo{
  width:88px;height:88px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 4px rgba(47,129,247,0.2),0 0 40px rgba(47,129,247,0.15);
  overflow:hidden;margin-bottom:14px;flex:none;
}
.auth-logo img{width:100%;height:100%;object-fit:contain}
.auth-org{color:var(--primary);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-align:center;margin-bottom:4px}
.auth-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:3px}
.auth-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:28px}
.auth-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:28px 24px;width:100%;max-width:380px;
  box-shadow:var(--shadow);position:relative;z-index:1;
}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:var(--r-sm);padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .2s}
.auth-tab.active{background:var(--surface2);color:var(--text)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{
  width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r-sm);font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary)}
.fg select option{background:var(--surface2)}
.fg textarea{resize:vertical;min-height:70px}
.btn-primary{
  width:100%;padding:12px;background:var(--primary);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:14px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:background .2s,transform .1s;
}
.btn-primary:active{transform:scale(.98)}
.btn-primary:hover{background:var(--primary-d)}
.auth-err{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);padding:9px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;margin-bottom:12px;display:none;text-align:center}
.auth-ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);padding:9px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;margin-bottom:12px;display:none;text-align:center}
.otp-row{margin-bottom:12px}
.otp-row input{width:100%;padding:13px 16px;text-align:center;font-size:24px;font-weight:700;letter-spacing:10px;border:2px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;outline:none;transition:border-color .2s}
.otp-row input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.otp-hint{font-size:11px;color:var(--text3);margin-bottom:10px;padding:8px;background:rgba(47,129,247,.08);border-radius:6px;font-family:'DM Mono',monospace}
.link-btn{background:none;border:none;color:var(--primary);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;text-decoration:underline}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ─── APP SHELL ─── */
#app{height:100vh;display:none;flex-direction:column}
.top-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 14px;display:flex;align-items:center;gap:10px;
  min-height:52px;flex:none;position:sticky;top:0;z-index:100;
}
.top-logo{width:34px;height:34px;border-radius:50%;background:#fff;overflow:hidden;flex:none;display:flex;align-items:center;justify-content:center}
.top-logo img{width:100%;height:100%;object-fit:contain}
.top-org{flex:1;overflow:hidden}
.top-org-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-org-sub{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-actions{display:flex;align-items:center;gap:6px;flex:none}
.icon-btn{
  width:34px;height:34px;border-radius:var(--r-sm);background:transparent;border:none;
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:background .2s,color .2s;
}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.lang-pill{display:flex;background:var(--surface2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.lang-opt{padding:5px 9px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.lang-opt.active{background:var(--primary);color:#fff}
.user-chip{
  display:flex;align-items:center;gap:7px;padding:5px 10px;
  background:var(--surface2);border-radius:20px;cursor:pointer;border:1px solid var(--border);
}
.user-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex:none}
.user-name{font-size:12px;font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── LAYOUT ─── */
.app-body{flex:1;display:flex;overflow:hidden}
.sidebar{
  width:220px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex:none;overflow-y:auto;
}
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:90;transform:translateX(-100%);transition:transform .25s;width:240px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:block!important}
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:89;top:52px}
.sidebar-section{padding:10px 8px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-sm);
  margin:1px 6px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;
  transition:all .15s;border:none;background:transparent;font-family:inherit;width:calc(100% - 12px);text-align:left;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--primary-glow);color:var(--primary);font-weight:600}
.nav-item .ni-icon{font-size:15px;flex:none;width:20px;text-align:center}
.nav-item .ni-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.main{flex:1;overflow-y:auto;padding:16px}

/* ─── CARDS & SECTIONS ─── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
  border-radius:var(--r-sm);border:none;font-size:13px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-pr{background:var(--primary);color:#fff}
.btn-pr:hover{background:var(--primary-d)}
.btn-out{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-out:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.btn-danger:hover{background:rgba(248,81,73,.25)}
.btn-success{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc,var(--primary))}
.stat-val{font-size:26px;font-weight:800;line-height:1;font-family:'DM Mono',monospace}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}
.stat-icon{position:absolute;top:12px;right:12px;font-size:20px;opacity:.2}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-blue{background:rgba(47,129,247,.15);color:var(--primary)}
.tag-green{background:rgba(63,185,80,.15);color:var(--green)}
.tag-red{background:rgba(248,81,73,.15);color:var(--red)}
.tag-yellow{background:rgba(210,153,34,.15);color:var(--yellow)}
.tag-purple{background:rgba(210,168,255,.15);color:var(--accent3)}
.tag-orange{background:rgba(255,166,87,.15);color:var(--accent4)}
.badge-role{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* ─── TABLE ─── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.td-actions{display:flex;gap:5px;flex-wrap:wrap}
.td-mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}

/* ─── SEARCH / FILTER ─── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-box{
  flex:1;min-width:160px;padding:8px 12px 8px 34px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;
  font-family:inherit;color:var(--text);outline:none;position:relative;
}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-wrap::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.search-box:focus{border-color:var(--primary)}
.filter-select{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;color:var(--text);outline:none}
.filter-select:focus{border-color:var(--primary)}
.filter-select option{background:var(--surface2)}

/* ─── MODAL ─── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:500;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
@media(min-width:640px){
  .modal-overlay{align-items:center}
  .modal-sheet{border-radius:var(--r-lg)!important;max-height:90vh}
}
.modal-sheet{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
  width:100%;max-width:580px;max-height:90vh;
  overflow-y:auto;padding:20px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:var(--surface2);border:none;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center}
.form-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}

/* ─── FILE UPLOAD ─── */
.upload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:8px}
.upload-slot{
  border:1.5px dashed var(--border2);border-radius:var(--r-sm);padding:14px 10px;
  text-align:center;cursor:pointer;position:relative;transition:border-color .2s,background .2s;
  background:var(--bg);
}
.upload-slot:hover{border-color:var(--primary);background:var(--primary-glow)}
.upload-slot.has-file{border-color:var(--green);border-style:solid;background:rgba(63,185,80,.05)}
.upload-slot input{position:absolute;inset:0;opacity:0;cursor:pointer}
.up-icon{font-size:22px;margin-bottom:5px}
.up-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.up-name{font-size:10px;color:var(--green);font-weight:600;margin-top:3px;word-break:break-all}
.up-actions{position:relative;z-index:2;display:flex;justify-content:center;gap:5px;margin-top:8px}
.up-act-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.up-act-btn:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.up-act-remove:hover{background:var(--red);border-color:var(--red)}

/* ─── PROGRESS BAR ─── */
.prog-bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .5s}

/* ─── OFFICE CARD ─── */
.office-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s;
}
.office-card:hover{border-color:var(--primary);background:rgba(47,129,247,.03)}
.office-card.selected{border-color:var(--primary);background:var(--primary-glow)}
.office-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.office-name{font-size:14px;font-weight:700}
.office-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text2)}
.office-meta span{display:flex;align-items:center;gap:4px}

/* ─── CONTACT ACTIONS ─── */
.contact-btns{display:flex;gap:6px}
.contact-btn{
  width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;text-decoration:none;
  transition:transform .15s;flex:none;
}
.contact-btn:active{transform:scale(.9)}
.cb-call{background:rgba(63,185,80,.2)}
.cb-sms{background:rgba(47,129,247,.2)}
.cb-mail{background:rgba(210,168,255,.2)}

/* ─── EMPTY STATE ─── */
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:13px;margin-top:6px}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:11px 18px;border-radius:var(--r);font-size:13px;font-weight:600;
  box-shadow:var(--shadow);z-index:900;transition:transform .3s;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ─── ACCESS CONTROL ─── */
.ac-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ac-row:last-child{border-bottom:none}
.ac-user{flex:1;font-size:13px;font-weight:600}
.ac-toggle{display:flex;gap:4px;flex-wrap:wrap}
.ac-chip{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.ac-chip.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* ─── PROJECT TYPE CHIPS ─── */
.pt-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.pt-chip{
  display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
  border-radius:20px;background:var(--surface2);border:1px solid var(--border);
  font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
}
.pt-chip.selected{background:var(--primary-glow);border-color:var(--primary);color:var(--primary)}
.pt-chip .del-pt{color:var(--red);font-size:14px;font-weight:700;margin-left:2px}

/* ─── MISC ─── */
.divider{height:1px;background:var(--border);margin:14px 0}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill-num{background:rgba(47,129,247,.12);color:var(--primary);font-family:'DM Mono',monospace;font-size:10px}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:12px;font-size:12px}
.detail-row:last-child{border-bottom:none}
.dk{color:var(--text2);font-weight:600;flex:none;width:130px}
.dv{color:var(--text);font-weight:500;text-align:right;word-break:break-word}
.no-scroll{overflow:hidden}
</style>
</head>
<body>

<!-- ══════════════ AUTH ══════════════ -->

function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function genOTP(){return String(Math.floor(100000+Math.random()*900000))}
function fmt(n){if(!n||n===0)return '—'; const c=n/10000000; if(c>=1)return c.toFixed(2)+' Cr NPR'; const l=n/100000; if(l>=1)return l.toFixed(2)+' L NPR'; return n.toLocaleString()+' NPR';}
function pct(n){return n===null||n===undefined?'—':Math.round(n*100)+'%'}
function myOffice(){return CU&&CU.officeId ? gO().find(o=>o.id===CU.officeId) : null}
function canEdit(){return CU&&(CU.role==='superadmin'||CU.role==='admin')}
function hasAccess(section){
  if(!CU) return false;
  if(CU.role==='superadmin'||CU.role==='admin') return true;
  return !!(CU.access&&CU.access[section]);
}
function filterByOffice(arr){
  if(!CU) return [];
  if(CU.role==='superadmin') return arr;
  return arr.filter(p=>p.officeId===CU.officeId);
}
function officeName(id){ const o=gO().find(o=>o.id===id); return o?o.name:'—';}
function statusTag(s){
  if(!s) return '';
  if(s==='Running'||s==='चलिरहेको') return `<span class="tag tag-blue">${s}</span>`;
  if(s==='Complete'||s==='सम्पन्न') return `<span class="tag tag-green">${s}</span>`;
  return `<span class="tag tag-yellow">${s}</span>`;
}
function avatarColor(name){ const colors=['#2f81f7','#3fb950','#f78166','#d2a8ff','#ffa657','#79c0ff']; let h=0; for(let c of name) h=(h+c.charCodeAt(0))%colors.length; return colors[h];}
function toast(msg,color='var(--green)'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.borderColor=color;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500);
}

function buildOTPInputs(containerId){
  const el=document.getElementById(containerId);
  const inp=document.createElement('input');
  inp.type='text'; inp.maxLength=6; inp.inputMode='numeric';
  inp.placeholder='000000'; inp.autocomplete='one-time-code';
  inp.id=`otp_single_${containerId}`;
  inp.oninput=()=>{ inp.value=inp.value.replace(/\D/g,'').slice(0,6); };
  el.appendChild(inp);
}
function getOTPVal(containerId){
  const el=document.getElementById(`otp_single_${containerId}`);
  return el?el.value.trim():'';
}

function showTab(tab){
  document.getElementById('tab-login-btn').classList.toggle('active',tab==='login');
  document.getElementById('tab-signup-btn').classList.toggle('active',tab==='signup');
  document.getElementById('login-panel').style.display=tab==='login'?'block':'none';
  document.getElementById('signup-panel').style.display=tab==='signup'?'block':'none';
  // populate office dropdown for signup
  if(tab==='signup'){
    const sel=document.getElementById('su-office');
    const current=sel.value;
    sel.innerHTML='<option value="">— Select Office —</option>';
    gO().forEach(o=>{ const opt=document.createElement('option'); opt.value=o.id; opt.textContent=o.name; sel.appendChild(opt); });
    sel.value=current;
  }
}

function loginStep1(){
  const uid=document.getElementById('l-uid').value.trim();
  const pwd=document.getElementById('l-pwd').value;
  const err=document.getElementById('login-err');
  const users=gU();
  const u=Object.values(users).find(u=>(u.uid===uid||u.email===uid)&&u.pwd===pwd&&u.active!==false);
  if(!u){ err.style.display='block'; err.textContent=LANG==='en'?'Invalid credentials':'गलत प्रयोगकर्ता नाम वा पासवर्ड'; return; }
  err.style.display='none'; _pending=u;
  _otp=genOTP();
  document.getElementById('login-form-div').style.display='none';
  document.getElementById('login-otp-div').style.display='block';
  buildOTPInputs('login-otp-inputs');
  document.getElementById('login-otp-hint').textContent=`🔐 Demo OTP: ${_otp} (in production sent via SMS to ${u.phone})`;
  document.getElementById('otp_single_login-otp-inputs')?.focus();
}
function loginOTPVerify(){
  const entered=getOTPVal('login-otp-inputs');
  if(entered===_otp){ loginSuccess(_pending); }
  else { document.getElementById('login-err').style.display='block'; document.getElementById('login-err').textContent='Incorrect OTP'; }
}
function resendOTP(type){ _otp=genOTP(); const hintId=type==='login'?'login-otp-hint':'signup-otp-hint'; document.getElementById(hintId).textContent=`🔐 New OTP: ${_otp}`; }

function loginSuccess(u){
  CU=u;
  document.getElementById('auth-screen').style.display='none';
  const appEl=document.getElementById('app'); appEl.style.display='flex';
  // top bar
  document.getElementById('top-uname').textContent=u.name.split(' ')[0];
  document.getElementById('top-avatar').textContent=u.name[0].toUpperCase();
  document.getElementById('top-avatar').style.background=avatarColor(u.name);
  // sidebar visibility
  document.getElementById('sb-superadmin').style.display=u.role==='superadmin'?'block':'none';
  // sidebar toggle on mobile
  const st=document.getElementById('sidebar-toggle');
  if(window.innerWidth<=640){ st.style.display='flex'; }
  window.addEventListener('resize',()=>{ st.style.display=window.innerWidth<=640?'flex':'none'; });

  nav('dashboard');
}

function signupStep1(){
  const name=document.getElementById('su-name').value.trim();
  const uid=document.getElementById('su-uid').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const phone=document.getElementById('su-phone').value.trim();
  const pwd=document.getElementById('su-pwd').value;
  const pwd2=document.getElementById('su-pwd2').value;
  const officeId=document.getElementById('su-office').value;
  const err=document.getElementById('signup-err');
  if(!name||!uid||!email||!phone||!pwd){ err.style.display='block'; err.textContent='All fields required.'; return; }
  if(pwd!==pwd2){ err.style.display='block'; err.textContent='Passwords do not match.'; return; }
  if(pwd.length<6){ err.style.display='block'; err.textContent='Password too short.'; return; }
  if(gU()[uid]){ err.style.display='block'; err.textContent='User ID already taken.'; return; }
  err.style.display='none';
  _pending={uid,name,pwd,role:'viewer',email,phone,officeId:officeId||null,active:true,access:{ncb:true,sq:true,cc:true,employees:false}};
  _otp=genOTP();
  document.getElementById('signup-form-div').style.display='none';
  document.getElementById('signup-otp-div').style.display='block';
  buildOTPInputs('signup-otp-inputs');
  document.getElementById('signup-otp-hint').textContent=`🔐 Demo OTP: ${_otp} (sent to ${phone})`;
  document.getElementById('otp_single_signup-otp-inputs')?.focus();
}
function signupOTPVerify(){
  const entered=getOTPVal('signup-otp-inputs');
  if(entered===_otp){
    const users=gU(); users[_pending.uid]=_pending; LS.set('oms_users',users);
    document.getElementById('signup-ok').style.display='block';
    document.getElementById('signup-ok').textContent='✅ Account created! You can now log in.';
    document.getElementById('signup-otp-div').style.display='none';
    setTimeout(()=>{ showTab('login'); document.getElementById('signup-ok').style.display='none'; },2000);
  } else {
    document.getElementById('signup-err').style.display='block';
    document.getElementById('signup-err').textContent='Incorrect OTP.';
  }
}
function doLogout(){
  CU=null; CPage='dashboard';
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('login-form-div').style.display='block';
  document.getElementById('login-otp-div').style.display='none';
  document.getElementById('l-uid').value=''; document.getElementById('l-pwd').value='';
}

function nav(page){
  CPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const activeBtn=document.getElementById('n-'+page);
  if(activeBtn) activeBtn.classList.add('active');
  closeSidebar();
  const mc=document.getElementById('main-content');
  switch(page){
    case 'dashboard': mc.innerHTML=renderDashboard(); break;
    case 'offices': mc.innerHTML=renderOffices(); break;
    case 'users': mc.innerHTML=renderUsers(); break;
    case 'proj-types': mc.innerHTML=renderProjTypes(); break;
    case 'access-control': mc.innerHTML=renderAccessControl(); break;
    case 'ncb': mc.innerHTML=renderProjects('ncb'); break;
    case 'sq': mc.innerHTML=renderProjects('sq'); break;
    case 'cc': mc.innerHTML=renderProjects('cc'); break;
    case 'employees': mc.innerHTML=renderEmployees(); break;
    default: mc.innerHTML=renderDashboard();
  }
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').style.display=document.getElementById('sidebar').classList.contains('open')?'block':'none'; }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').style.display='none'; }

function renderDashboard(){
  const allNCB=filterByOffice(gNCB()), allSQ=filterByOffice(gSQ()), allCC=filterByOffice(gCC());
  const allEmp=filterByOffice(gEmp()), offices=gO(), users=gU();
  const allProj=[...allNCB,...allSQ,...allCC];
  const complete=allProj.filter(p=>p.status==='Complete').length;
  const running=allProj.filter(p=>p.status==='Running').length;
  const isSA=CU.role==='superadmin';
  let cards=`
    <div class="stat-grid">
      <div class="stat-card" style="--sc:var(--primary)"><span class="stat-icon">📋</span><div class="stat-val">${allProj.length}</div><div class="stat-lbl">${t('totalProjects')}</div></div>
      <div class="stat-card" style="--sc:var(--accent2)"><span class="stat-icon">✅</span><div class="stat-val">${complete}</div><div class="stat-lbl">${t('completed')}</div></div>
      <div class="stat-card" style="--sc:var(--accent4)"><span class="stat-icon">🔄</span><div class="stat-val">${running}</div><div class="stat-lbl">${t('running')}</div></div>
      <div class="stat-card" style="--sc:var(--accent3)"><span class="stat-icon">👤</span><div class="stat-val">${allEmp.length}</div><div class="stat-lbl">${t('totalEmployees')}</div></div>
      ${isSA?`<div class="stat-card" style="--sc:var(--accent)"><span class="stat-icon">🏢</span><div class="stat-val">${offices.length}</div><div class="stat-lbl">${t('offices_count')}</div></div>`:''}
      ${isSA?`<div class="stat-card" style="--sc:var(--yellow)"><span class="stat-icon">👥</span><div class="stat-val">${Object.keys(users).length}</div><div class="stat-lbl">${t('users')}</div></div>`:''}
    </div>`;

  // Recent projects
  const recent=allProj.slice(-5).reverse();
  let recentHtml='';
  if(recent.length){
    recentHtml=`<div class="card"><div class="card-title">🕐 Recent Projects</div><div class="tbl-wrap"><table>
      <tr><th>${t('projectName')}</th><th>${t('type')}</th><th>${t('status')}</th><th>${t('progress')}</th></tr>
      ${recent.map(p=>`<tr>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</td>
        <td>${gPT().find(t=>t.id===p.type)?.name||'—'}</td>
        <td>${statusTag(p.status)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="prog-bar-bg" style="flex:1;min-width:60px"><div class="prog-bar-fill" style="width:${Math.round((p.progress||0)*100)}%;background:${p.progress>=1?'var(--green)':p.progress>=0.5?'var(--primary)':'var(--accent4)'}"></div></div>
            <span style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace">${pct(p.progress)}</span>
          </div>
        </td>
      </tr>`).join('')}
    </table></div></div>`;
  }

  // Office selector for SA
  let officeSel='';
  if(isSA && offices.length){
    officeSel=`<div class="card"><div class="card-title">🏢 Offices Overview</div>
      ${offices.map(o=>{
        const oProj=[...gNCB(),...gSQ(),...gCC()].filter(p=>p.officeId===o.id);
        const oEmp=gEmp().filter(e=>e.officeId===o.id);
        const admin=Object.values(gU()).find(u=>u.uid===o.adminId);
        return `<div class="office-card" onclick="nav('offices')">
          <div class="office-hdr">
            <div>
              <div class="office-name">${o.name}</div>
              <div class="office-meta"><span>📍 ${o.district}</span><span>📋 ${oProj.length} projects</span><span>👤 ${oEmp.length} staff</span></div>
            </div>
            <span class="tag tag-blue">${admin?admin.name:'No Admin'}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  return `<div class="page-header"><div><div class="page-title">${t('dashboard')}</div><div class="page-sub">${CU.role==='superadmin'?t('org'):(myOffice()?.name||'')}</div></div>
    <button class="btn btn-pr" onclick="printSummaryReport()" style="display:flex;align-items:center;gap:6px">📊 Summary Report</button>
    </div>
    ${cards}${recentHtml}${officeSel}`;
}

function renderUsersRows(users){

    </div></td>
    <td class="td-mono">${u.uid}</td>
    <td><span class="badge-role" style="background:${roleBg[u.role]||'var(--text3)'};color:#fff">${u.role}</span></td>

      <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.uid}')">🗑️</button>
    </div></td>
  </tr>`).join('');

function filterUsers(){
  const q=(document.getElementById('user-search')?.value||'').toLowerCase();
  const role=(document.getElementById('user-role-filter')?.value||'');
  let users=Object.values(gU());
  if(q) users=users.filter(u=>u.name.toLowerCase().includes(q)||u.uid.toLowerCase().includes(q)||u.email.toLowerCase().includes(q));
  if(role) users=users.filter(u=>u.role===role);
  const tb=document.getElementById('users-tbody');
  if(tb) tb.innerHTML=renderUsersRows(users);
}

function saveUser(editUid){
  const v=id=>document.getElementById(id)?.value?.trim();
  const users=gU();
  const thisUid=editUid||v('nu-uid');
  if(!thisUid||!v('nu-name')){toast('Name and User ID required','var(--red)');return;}
  if(!editUid && users[thisUid]){toast('User ID taken','var(--red)');return;}
  const existing=editUid?users[editUid]:{};
  const newPwd=v('nu-pwd');
  users[thisUid]={
    ...existing,
    uid:thisUid, name:v('nu-name'), email:v('nu-email'), phone:v('nu-phone'),
    role:v('nu-role'), officeId:v('nu-office')||null,
    active:document.getElementById('nu-active')?document.getElementById('nu-active').value==='true':true,
    pwd:newPwd||(existing.pwd||'changeme'),
    access:existing.access||{ncb:true,sq:true,cc:true,employees:false}
  };
  LS.set('oms_users',users); closeModal(); nav('users'); toast('User saved ✅');
}

function deleteUser(uid){
  if(uid===CU.uid){toast('Cannot delete yourself','var(--red)');return;}
  if(!confirm('Delete user '+uid+'?')) return;
  const users=gU(); delete users[uid]; LS.set('oms_users',users); nav('users'); toast('User deleted');
}

      +'</div>'

      // info grid
      +(infoItems?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;font-size:12px;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:var(--r-sm)">'+infoItems+'</div>':'')

      // provider
      +providerHtml

      // progress
      +'<div style="margin-bottom:10px">'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">'
          +'<span style="color:var(--text2);font-weight:600">Physical Progress</span>'
          +'<span style="font-family:\'DM Mono\',monospace;font-weight:700;color:'+progColor+'">'+pct(prog)+'</span>'
        +'</div>'
        +'<div class="prog-bar-bg" style="height:8px"><div class="prog-bar-fill" style="width:'+Math.round(prog*100)+'%;background:'+progColor+'"></div></div>'
      +'</div>'

      +fileBadges
    +'</div>';
  });
  html+='</div>';
  return html;
}



function isDeadlineNear(dateStr){
  if(!dateStr) return false;
  try{ const d=new Date(dateStr); const diff=(d-new Date())/(1000*60*60*24); return diff>=0&&diff<=21; }catch(e){return false;}
}

function clearFilters(ptype){
  ['proj-search-','proj-district-filter-','proj-type-filter-','proj-status-filter-','proj-office-filter-'].forEach(p=>{
    const el=document.getElementById(p+ptype); if(el){ if(el.tagName==='INPUT') el.value=''; else el.value=''; }
  });
  filterProjList(ptype);
}

function filterProjList(ptype){
  const q=(document.getElementById(`proj-search-${ptype}`)?.value||'').toLowerCase();
  const typeF=document.getElementById(`proj-type-filter-${ptype}`)?.value||'';
  const offF=document.getElementById(`proj-office-filter-${ptype}`)?.value||'';
  const distF=document.getElementById(`proj-district-filter-${ptype}`)?.value||'';
  const statF=document.getElementById(`proj-status-filter-${ptype}`)?.value||'';
  let list=filterByOffice(PROJ_LABELS[ptype].get());
  if(q) list=list.filter(p=>
    p.name.toLowerCase().includes(q)||
    (p.nameNp||'').toLowerCase().includes(q)||
    (p.officer||'').toLowerCase().includes(q)||
    (p.contractNo||'').toLowerCase().includes(q)||
    (p.providerName||'').toLowerCase().includes(q)||
    (p.pan||'').toLowerCase().includes(q)
  );
  if(typeF) list=list.filter(p=>p.type===typeF);
  if(offF) list=list.filter(p=>p.officeId===offF);
  if(distF) list=list.filter(p=>p.district===distF);
  if(statF) list=list.filter(p=>p.status===statF);
  const el=document.getElementById(`proj-list-${ptype}`);
  if(el) el.innerHTML=renderProjCards(list,ptype);
  // show active filter tags
  const tags=[];
  if(q) tags.push(`🔍 "${q}"`);
  if(distF) tags.push(`📍 ${distF}`);
  if(typeF) tags.push(`🏷️ ${gPT().find(x=>x.id===typeF)?.name||typeF}`);
  if(statF) tags.push(`📊 ${statF}`);
  if(offF) tags.push(`🏢 ${officeName(offF)}`);
  const af=document.getElementById(`proj-active-filters-${ptype}`);
  if(af) af.innerHTML=tags.map(tag=>`<span class="tag tag-yellow" style="font-size:11px">${tag}</span>`).join('');
}

function saveProject(ptype,editId){
  const v=id=>document.getElementById(id)?.value?.trim()||'';
  const isSA=CU.role==='superadmin';
  const isNCB=(ptype==='ncb');
  if(!v('pj-name')){toast('Project name required','var(--red)');return;}
  const list=PROJ_LABELS[ptype].get();
  const existing=editId?list.find(x=>x.id===editId):{};
  const merged=Object.assign({},existing.files||{},_uploadedFiles);
  const proj={
    ...(existing||{}),
    id:editId||uid(),
    officeId:isSA?(v('pj-office')||null):(CU.officeId||null),
    name:v('pj-name'), nameNp:v('pj-nameNp'),
    type:v('pj-type'),
    district:isNCB?v('pj-district'):'',
    contractNo:v('pj-contractNo'),
    pan:v('pj-pan'), activityNo:v('pj-activityNo'),
    budgetCode:v('pj-budgetCode'), expenseCode:v('pj-expenseCode'), accountNo:v('pj-accountNo'),
    providerName:v('pj-providerName'), providerPhone:v('pj-providerPhone'), providerEmail:v('pj-providerEmail'),
    estimate:parseFloat(v('pj-estimate'))||0,
    contractAmt:parseFloat(v('pj-contractAmt'))||0,
    contractDate:v('pj-contractDate'), deadline:v('pj-deadline'),
    officer:v('pj-officer'),
    status:v('pj-status'),
    progress:(parseFloat(v('pj-progress'))||0)/100,
    files:merged,
  };
  if(editId){ const i=list.findIndex(x=>x.id===editId); if(i>=0) list[i]=proj; }
  else list.push(proj);
  PROJ_LABELS[ptype].set(list); closeModal(); nav(ptype); toast('Project saved ✅');
}

function deleteProject(ptype,id){
  if(!confirm('Delete this project?')) return;
  PROJ_LABELS[ptype].set(PROJ_LABELS[ptype].get().filter(p=>p.id!==id));
  nav(ptype); toast('Project deleted');
}

    +'</body></html>';

  // Remove any existing print frame
  var old=document.getElementById('pf');

  var iframe=document.createElement('iframe');
  iframe.id='pf';
  iframe.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;background:#fff;';

  idoc.close();

  // Trigger print after content loads

  };
}

function filterEmps(){
  const q=(document.getElementById('emp-search')?.value||'').toLowerCase();

  if(q) emps=emps.filter(e=>e.name.toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q)||(e.title||'').toLowerCase().includes(q));
  if(off) emps=emps.filter(e=>e.officeId===off);

function saveEmployee(editId){
  const v=id=>document.getElementById(id)?.value?.trim();
  if(!v('em-name')){toast('Name required','var(--red)');return;}
  const isSA=CU.role==='superadmin';
  const emps=gEmp();
  const obj={
    id:editId||uid(), name:v('em-name'), nameNp:v('em-nameNp'),
    title:v('em-title'), dept:v('em-dept'),
    phone:v('em-phone'), email:v('em-email'), bank:v('em-bank'),

var _cpForFiles=null;
function handleUpload(slotId,key,input){
  if(!input||!input.files||!input.files.length) return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    _uploadedFiles[key]={
      name:file.name,
      size:file.size,
      type:file.type||guessMime(file.name),
      count:input.files.length,
      dataUrl:e.target.result
    };
    refreshUploadSlot(slotId,key);
  };
  reader.readAsDataURL(file);
}

function guessMime(name){
  var ext=(name.split('.').pop()||'').toLowerCase();
  var map={pdf:'application/pdf',xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',xls:'application/vnd.ms-excel',jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png'};
  return map[ext]||'application/octet-stream';
}

function refreshUploadSlot(slotId,key){
  var slot=document.getElementById(slotId);
  if(!slot) return;
  slot.classList.add('has-file');
  var f=_uploadedFiles[key];
  var nameEl=document.getElementById('un-'+key);
  if(nameEl) nameEl.textContent=f.count>1?(f.count+' files'):f.name;
  var icon=slot.querySelector('.up-icon');
  if(icon) icon.textContent='\u2705';
  // add view/download/remove action row if not present
  var actions=document.getElementById('ua-'+key);
  if(!actions){
    actions=document.createElement('div');
    actions.id='ua-'+key;
    actions.className='up-actions';
    slot.appendChild(actions);
  }
  actions.innerHTML=
    '<button type="button" class="up-act-btn" onclick="event.stopPropagation();viewFile(\''+key+'\')" title="View">\uD83D\uDC41\uFE0F</button>'+
    '<button type="button" class="up-act-btn" onclick="event.stopPropagation();downloadFile(\''+key+'\')" title="Download">\u2B07\uFE0F</button>'+
    '<button type="button" class="up-act-btn up-act-remove" onclick="event.stopPropagation();removeFile(\''+slotId+'\',\''+key+'\')" title="Remove">\u2715</button>';
}

function getActiveFile(key){
  // Prefer in-progress upload, fall back to the project currently open in the modal
  if(_uploadedFiles[key]) return _uploadedFiles[key];
  if(_cpForFiles && _cpForFiles.files) return _cpForFiles.files[key];
  return null;
}

function viewFile(key){
  var f=getActiveFile(key);
  if(!f||!f.dataUrl){ toast('No file data available','var(--red)'); return; }
  var win=window.open();
  if(!win){
    // popup blocked — fall back to opening in same tab via temporary link
    var a=document.createElement('a');
    a.href=f.dataUrl; a.target='_blank'; a.rel='noopener';
    document.body.appendChild(a); a.click(); a.remove();
    return;
  }
  if(f.type==='application/pdf'||f.type.indexOf('image/')===0){
    win.document.write('<title>'+f.name+'</title><body style="margin:0;background:#222"><embed src="'+f.dataUrl+'" style="width:100%;height:100vh" type="'+f.type+'"></body>');
  } else {
    win.location.href=f.dataUrl;
  }
}

function downloadFile(key){
  var f=getActiveFile(key);
  if(!f||!f.dataUrl){ toast('No file data available','var(--red)'); return; }
  var a=document.createElement('a');
  a.href=f.dataUrl; a.download=f.name;
  document.body.appendChild(a); a.click(); a.remove();
}

function removeFile(slotId,key){
  delete _uploadedFiles[key];
  if(_cpForFiles && _cpForFiles.files) delete _cpForFiles.files[key];
  var slot=document.getElementById(slotId);
  if(slot){
    slot.classList.remove('has-file');
    var icon=slot.querySelector('.up-icon');
    var nameEl=document.getElementById('un-'+key);
    var actions=document.getElementById('ua-'+key);
    if(actions) actions.remove();
    var labelMap={photos:'\uD83D\uDCF7',muchulka:'\uD83D\uDCDC',comparative:'\uD83D\uDCC8',bankGuarantee:'\uD83C\uDFE6',insurance:'\uD83D\uDEE1\uFE0F',estimate:'\uD83D\uDCCA',docs:'\uD83D\uDCC4'};
    if(icon) icon.textContent=labelMap[key]||'\uD83D\uDCCE';
    if(nameEl) nameEl.textContent=slot.dataset.accept||'';
  }
  toast('File removed');
}

function categorizeProject(p){

//  SUMMARY REPORT — all projects, all offices, grouped by category
// ───────────────────────────────────────────────────────
function printSummaryReport(){
  var allNCB=gNCB(), allSQ=gSQ(), allCC=gCC();
  var all=allNCB.concat(allSQ).concat(allCC);
  if(CU.role!=='superadmin'){
    all=all.filter(function(p){return p.officeId===CU.officeId;});
  }

  var complete=all.filter(function(p){return p.status==='Complete';}).length;
  var running=all.filter(function(p){return p.status==='Running';}).length;
  var pending=all.filter(function(p){return p.status==='Pending';}).length;
  var totalEstimate=all.reduce(function(s,p){return s+(p.estimate||0);},0);
  var totalContract=all.reduce(function(s,p){return s+(p.contractAmt||0);},0);

  // group by category
  var categories={};
  all.forEach(function(p){
    var cat=categorizeProject(p);
    if(!categories[cat]) categories[cat]=[];
    categories[cat].push(p);
  });
  var catOrder=['Roads','Water Resources','Buildings & Urban Infrastructure','General Infrastructure'];
  var sortedCats=catOrder.filter(function(c){return categories[c];}).concat(Object.keys(categories).filter(function(c){return catOrder.indexOf(c)<0;}));

  var html=reportShellOpen('Summary Report');
  html+=reportHeader('Comprehensive Project Summary Report');

  html+='<div class="rp-stat-grid">'
    +'<div class="rp-stat-box"><div class="rp-stat-val">'+all.length+'</div><div class="rp-stat-lbl">Total Projects</div></div>'
    +'<div class="rp-stat-box"><div class="rp-stat-val">'+complete+'</div><div class="rp-stat-lbl">Completed</div></div>'
    +'<div class="rp-stat-box"><div class="rp-stat-val">'+running+'</div><div class="rp-stat-lbl">Running</div></div>'
    +'<div class="rp-stat-box"><div class="rp-stat-val">'+pending+'</div><div class="rp-stat-lbl">Pending</div></div>'
    +'</div>';

  html+='<div class="rp-section">'
    +'<div class="rp-section-title">Financial Overview</div>'
    +'<table class="rp-table">'
    +'<tr><th>Metric</th><th style="text-align:right">Amount (NPR)</th></tr>'
    +'<tr><td>Total Cost Estimate</td><td style="text-align:right;font-weight:700">'+fmtFull(totalEstimate)+'</td></tr>'
    +'<tr><td>Total Contract Amount</td><td style="text-align:right;font-weight:700">'+fmtFull(totalContract)+'</td></tr>'
    +'</table></div>';

  sortedCats.forEach(function(cat){
    var projs=categories[cat];
    html+='<div class="rp-cat-banner">'+cat+' &mdash; '+projs.length+' project(s)</div>';
    html+='<table class="rp-table"><tr>'
      +'<th>#</th><th>Project Name</th><th>Office</th><th>District</th>'
      +'<th>Contract No.</th><th>Provider</th><th>Estimate</th><th>Contract Amt</th>'
      +'<th>Deadline</th><th>Status</th><th>Progress</th></tr>';
    projs.forEach(function(p,i){
      html+='<tr>'
        +'<td>'+(i+1)+'</td>'
        +'<td><strong>'+(p.name||'\u2014')+'</strong></td>'
        +'<td>'+officeName(p.officeId)+'</td>'
        +'<td>'+(p.district||'\u2014')+'</td>'
        +'<td style="font-family:monospace;font-size:10px">'+(p.contractNo||'\u2014')+'</td>'
        +'<td>'+(p.providerName||'\u2014')+'</td>'
        +'<td style="text-align:right">'+fmtFull(p.estimate)+'</td>'
        +'<td style="text-align:right">'+fmtFull(p.contractAmt)+'</td>'
        +'<td>'+(p.deadline||'\u2014')+'</td>'
        +'<td><span class="rp-badge" style="'+statusBadgeStyle(p.status)+'">'+(p.status||'\u2014')+'</span></td>'
        +'<td>'+Math.round((p.progress||0)*100)+'%</td>'
        +'</tr>';
    });
    html+='</table>';
  });

  html+=reportShellClose('UDBO Office Management System \u2014 Confidential Government Summary Document');
  openReportFrame(html);
}

// ───────────────────────────────────────────────────────
//  INDIVIDUAL PROJECT REPORT — full detail, category-aware
// ───────────────────────────────────────────────────────
function printProjectReport(ptype,id){
  var list=PROJ_LABELS[ptype].get();
  var p=list.find(function(x){return x.id===id;});
  if(!p){ toast('Project not found','var(--red)'); return; }

  var category=categorizeProject(p);
  var html=reportShellOpen('Project Report \u2014 '+p.name);
  html+=reportHeader(PROJ_LABELS[ptype].label+' Project Detail Report');

  html+='<div class="rp-cat-banner">Category: '+category+'</div>';

  // ── General Information ──
  html+='<div class="rp-section"><div class="rp-section-title">General Information</div><div class="rp-detail-grid">';
  var generalFields=[
    ['Project Name (English)',p.name],
    ['Project Name (Nepali)',p.nameNp],
    ['Office',officeName(p.officeId)],
    ['District',p.district],
    ['Project Type',(gPT().find(function(t){return t.id===p.type;})||{name:'\u2014'}).name],
    ['Status',p.status],
    ['Physical Progress',Math.round((p.progress||0)*100)+'%'],
  ];
  generalFields.forEach(function(f){
    if(!f[1]) return;
    html+='<div class="rp-detail-row"><div class="rp-dk">'+f[0]+'</div><div class="rp-dv">'+f[1]+'</div></div>';
  });
  html+='</div></div>';

  // ── Identification Numbers ──
  html+='<div class="rp-section"><div class="rp-section-title">Identification & Reference Numbers</div><div class="rp-detail-grid">';
  var idFields=[
    ['Contract Number',p.contractNo],
    ['Activity Number',p.activityNo],
    ['PAN Number',p.pan],
    ['Budget Code',p.budgetCode],
    ['Expense Code',p.expenseCode],
    ['Account Number',p.accountNo],
  ];
  idFields.forEach(function(f){
    if(!f[1]) return;
    html+='<div class="rp-detail-row"><div class="rp-dk">'+f[0]+'</div><div class="rp-dv">'+f[1]+'</div></div>';
  });
  html+='</div></div>';

  // ── Provider / Contractor ──
  if(p.providerName||p.providerPhone||p.providerEmail){
    html+='<div class="rp-section"><div class="rp-section-title">Provider / Contractor Details</div><div class="rp-detail-grid">';
    var provFields=[
      ['Provider / Contractor Name',p.providerName],
      ['Phone Number',p.providerPhone],
      ['Email Address',p.providerEmail],
    ];
    provFields.forEach(function(f){
      if(!f[1]) return;
      html+='<div class="rp-detail-row"><div class="rp-dk">'+f[0]+'</div><div class="rp-dv">'+f[1]+'</div></div>';
    });
    html+='</div></div>';
  }

  // ── Financial Details ──
  html+='<div class="rp-section"><div class="rp-section-title">Financial Details</div><div class="rp-detail-grid">';
  var finFields=[
    ['Cost Estimate',fmtFull(p.estimate)],
    ['Contract Amount',fmtFull(p.contractAmt)],
    ['Contract Date',p.contractDate],
    ['Deadline',p.deadline],
  ];
  finFields.forEach(function(f){
    if(!f[1]||f[1]==='\u2014') return;
    html+='<div class="rp-detail-row"><div class="rp-dk">'+f[0]+'</div><div class="rp-dv">'+f[1]+'</div></div>';
  });
  html+='</div></div>';

  // ── Officer / Responsibility ──
  if(p.officer){
    html+='<div class="rp-section"><div class="rp-section-title">Responsible Officer</div><div class="rp-detail-grid">'
      +'<div class="rp-detail-row"><div class="rp-dk">Officer Name</div><div class="rp-dv">'+p.officer+'</div></div>'
      +'</div></div>';
  }

  // ── Category-specific sections (Roads / Water Resources) ──
  if(category==='Roads'){
    html+='<div class="rp-section"><div class="rp-section-title">Roads Sector \u2014 Technical Summary</div><div class="rp-detail-grid">'
      +'<div class="rp-detail-row"><div class="rp-dk">Infrastructure Type</div><div class="rp-dv">Road / Highway Construction or Upgrading</div></div>'
      +'<div class="rp-detail-row"><div class="rp-dk">Implementing Office</div><div class="rp-dv">'+officeName(p.officeId)+'</div></div>'
      +'<div class="rp-detail-row"><div class="rp-dk">District</div><div class="rp-dv">'+(p.district||'\u2014')+'</div></div>'
      +'<div class="rp-detail-row"><div class="rp-dk">Current Phase</div><div class="rp-dv">'+(p.status||'\u2014')+' ('+Math.round((p.progress||0)*100)+'% complete)</div></div>'
      +'</div></div>';
  } else if(category==='Water Resources'){
    html+='<div class="rp-section"><div class="rp-section-title">Water Resources Sector \u2014 Technical Summary</div><div class="rp-detail-grid">'
      +'<div class="rp-detail-row"><div class="rp-dk">Infrastructure Type</div><div class="rp-dv">Water Supply / Irrigation Infrastructure</div></div>'
      +'<div class="rp-detail-row"><div class="rp-dk">Implementing Office</div><div class="rp-dv">'+officeName(p.officeId)+'</div></div>'
      +'<div class="rp-detail-row"><div class="rp-dk">District</div><div class="rp-dv">'+(p.district||'\u2014')+'</div></div>'
      +'<div class="rp-detail-row"><div class="rp-dk">Current Phase</div><div class="rp-dv">'+(p.status||'\u2014')+' ('+Math.round((p.progress||0)*100)+'% complete)</div></div>'
      +'</div></div>';
  }

  // ── Remarks (if any field exists) ──
  if(p.remarks){
    html+='<div class="rp-section"><div class="rp-section-title">Remarks</div><div class="rp-detail-grid">'
      +'<div class="rp-detail-row" style="width:100%"><div class="rp-dv" style="flex:1">'+p.remarks+'</div></div>'
      +'</div></div>';
  }

  html+=reportShellClose('UDBO Office Management System \u2014 Confidential Government Document \u2014 Document attachments excluded from this report');
  openReportFrame(html);
}

seedIfEmpty();
// Mobile sidebar toggle
if(window.innerWidth<=640) document.getElementById('sidebar-toggle').style.display='flex';
</script>
